name: CI
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: cargo build
    strategy:
      matrix:
        os: [macos, windows]
        toolchain: [nightly]
        include:
          - os: ubuntu
            toolchain: 1.85.0
          - os: ubuntu
            toolchain: nightly
    runs-on: ${{ matrix.os }}-latest
    steps:
      - name: setup environment
        shell: bash
        run: |
          if [[ ${{ matrix.os }} = windows ]]; then
            echo suffix=.exe
          else
            echo suffix=
          fi >> $GITHUB_ENV
      - name: install libbsd
        if: ${{ matrix.os == 'ubuntu' }}
        run: sudo sh -c 'apt-get update && apt-get -y install libbsd-dev'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          toolchain: ${{ matrix.toolchain }}
          cache: false
      - run: cargo build --all-targets
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pass-${{ matrix.os }}-${{ matrix.toolchain }}
          path: target/debug/examples/pass${{ env.suffix }}
      - run: cargo test --all-targets --no-default-features
      - run: cargo test --all-targets
      - run: cargo test --all-targets --all-features
      - run: cargo publish --dry-run
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/main')

  lint:
    name: cargo fmt && cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          components: clippy,rustfmt
          cache: false
      - uses: actions-rust-lang/rustfmt@4066006ec54a31931b9b1fddfd38f2fdf2d27143 # v1
      - run: cargo clippy

  publish:
    name: cargo publish
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/main')
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    needs: [build, lint]
    environment: crates-io
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - run: cargo generate-lockfile && cat Cargo.lock
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
        if: startsWith(github.ref, 'refs/tags/v')
      - run: cargo publish --no-verify --locked
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
